<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MNA FC | Database Skuad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#2563eb',
                        'brand-gold': '#d7b67d',
                        'brand-dark-bg': '#09090b',
                    }
                }
            }
        }
    </script>
    <style>
        .glass-main { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; cursor: pointer; }
        .glass-card:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-3px); border-color: #2563eb; }
        .glass-modal { background: rgba(15, 15, 20, 0.95); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .modal-enter { animation: modalIn 0.3s ease-out forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="bg-[#F9FAFB] dark:bg-brand-dark-bg text-gray-900 dark:text-white transition-colors duration-500 pb-32">

    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-brand-dark-bg/80 backdrop-blur-md border-b border-gray-200 dark:border-white/10 pt-safe">
        <div class="max-w-3xl mx-auto px-5 h-16 flex items-center justify-between">
            <h1 class="font-black text-xl italic uppercase tracking-tighter">MNA <span class="text-brand-blue">FC</span></h1>
            <span class="text-[9px] font-bold py-1 px-3 bg-brand-blue/10 text-brand-blue rounded-full uppercase tracking-widest">Database Center</span>
        </div>
    </header>

    <main class="pt-24 px-5 max-w-3xl mx-auto">
        <div id="team-stats" class="glass-main rounded-[2rem] p-6 mb-8 grid grid-cols-3 gap-4 border border-gray-200 dark:border-white/5">
            <div class="text-center">
                <p id="win-rate" class="text-2xl font-black text-brand-blue">0%</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Win Rate</p>
            </div>
            <div class="text-center border-x border-gray-200 dark:border-white/10">
                <p id="match-record" class="text-2xl font-black text-gray-900 dark:text-white transition-colors">0-0-0</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">W - D - L</p>
            </div>
            <div class="text-center">
                <p id="goal-diff" class="text-2xl font-black text-brand-gold">+0</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Goal Diff</p>
            </div>
        </div>

        <div class="mb-6 sticky top-20 z-40 bg-[#F9FAFB] dark:bg-brand-dark-bg/95 py-4 transition-colors">
            <input type="text" id="playerSearch" placeholder="Ketik nama atau asal sekolah..." 
                class="w-full bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-2xl py-3 px-5 text-sm mb-4 outline-none focus:ring-2 focus:ring-brand-blue transition-all">
            
            <div class="flex gap-2 overflow-x-auto hide-scroll pb-2">
                <button onclick="setPosFilter('ALL', this)" class="pos-btn bg-brand-blue text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-brand-blue/20">ALL</button>
                <button onclick="setPosFilter('GK', this)" class="pos-btn bg-white dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase border border-gray-200 dark:border-white/10">GK</button>
                <button onclick="setPosFilter('DEF', this)" class="pos-btn bg-white dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase border border-gray-200 dark:border-white/10">DEF</button>
                <button onclick="setPosFilter('MID', this)" class="pos-btn bg-white dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase border border-gray-200 dark:border-white/10">MID</button>
                <button onclick="setPosFilter('FWD', this)" class="pos-btn bg-white dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase border border-gray-200 dark:border-white/10">FWD</button>
            </div>
        </div>

        <div id="playerGrid" class="grid grid-cols-1 gap-4">
            <div class="py-20 text-center animate-pulse text-gray-400 text-[10px] font-bold uppercase tracking-widest">
                Menghubungkan ke Database...
            </div>
        </div>
    </main>

    <div id="playerModal" class="fixed inset-0 z-[150] hidden flex items-center justify-center p-5">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div id="modalContent" class="glass-modal w-full max-w-sm rounded-[2.5rem] overflow-hidden relative z-10 modal-enter">
            </div>
    </div>

    <nav id="main-bottom-nav" class="fixed bottom-0 w-full z-[110] bg-white/90 dark:bg-[#09090b]/90 backdrop-blur-xl border-t border-gray-200 dark:border-white/10 pb-safe transition-colors">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto px-2">
            <a href="/" class="flex flex-col items-center justify-center w-full h-full text-gray-400 dark:text-gray-500 hover:text-brand-gold transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mb-1"></i>
                <span class="text-[8px] font-bold uppercase">Operator</span>
            </a>
            <a href="/tsl/" class="flex flex-col items-center justify-center w-full h-full text-gray-400 dark:text-gray-500 hover:text-brand-green transition-colors">
                <i data-lucide="trophy" class="w-5 h-5 mb-1"></i>
                <span class="text-[8px] font-bold uppercase">TSL Liga</span>
            </a>
            <button class="flex flex-col items-center justify-center w-full h-full text-brand-blue transition-colors">
                <i data-lucide="shield" class="w-5 h-5 mb-1"></i>
                <span class="text-[8px] font-bold uppercase">MNA FC</span>
            </button>
            <a href="/tsl/#pencarian" class="flex flex-col items-center justify-center w-full h-full text-gray-400 dark:text-gray-500 hover:text-brand-black dark:hover:text-white transition-colors">
                <i data-lucide="search" class="w-5 h-5 mb-1"></i>
                <span class="text-[8px] font-bold uppercase">Cari</span>
            </a>
        </div>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzZsFD9aNzjzBY5AT9wZnc3wMFVoQ60FTjUGyNCxC08H3gGa17GO3MHtI63MNP0JBAkvg/exec'; // GANTI DENGAN URL SCRIPT ANDA
        let squadData = { pemain: [], statistik: {} };
        let activeFilter = 'ALL'; // Menyimpan state posisi

        const val = (data, fallback = "-") => (data === "" || data === null || data === undefined) ? fallback : data;

        async function init() {
            const cache = localStorage.getItem('mnafc_cache');
            if (cache) {
                squadData = JSON.parse(cache);
                updateUI();
            }

            try {
                const res = await fetch(`${API_URL}?t=${Date.now()}`);
                const data = await res.json();
                squadData = data;
                localStorage.setItem('mnafc_cache', JSON.stringify(data));
                updateUI();
            } catch (e) {
                console.error("Gagal sinkron:", e);
                if (!cache) document.getElementById('playerGrid').innerHTML = '<p class="text-center py-10 text-red-500 font-bold text-xs uppercase">Koneksi Gagal</p>';
            }
            lucide.createIcons();
        }

        function updateUI() {
            updateTeamDashboard(squadData.statistik);
            jalankanPencarian(); // Render grid menggunakan data terbaru
        }

        function updateTeamDashboard(s) {
            if(!s) return;
            const menang = parseInt(val(s.menang, 0));
            const seri = parseInt(val(s.seri, 0));
            const kalah = parseInt(val(s.kalah, 0));
            const total = menang + seri + kalah;
            const wr = total > 0 ? Math.round((menang / total) * 100) : 0;
            
            document.getElementById('win-rate').innerText = wr + '%';
            document.getElementById('match-record').innerText = `${menang}-${seri}-${kalah}`;
            const diff = parseInt(val(s.gol_masuk, 0)) - parseInt(val(s.gol_kemasukan, 0));
            document.getElementById('goal-diff').innerText = (diff >= 0 ? '+' : '') + diff;
        }

        function renderPlayers(list) {
            const grid = document.getElementById('playerGrid');
            
            // JIKA HASIL PENCARIAN KOSONG
            if (list.length === 0) {
                grid.innerHTML = `
                    <div class="py-16 text-center">
                        <i data-lucide="search-x" class="w-12 h-12 mx-auto text-gray-300 dark:text-white/10 mb-3"></i>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Pemain tidak ditemukan</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            // JIKA ADA HASIL
            grid.innerHTML = list.map((p) => {
                // Cari index asli dari data untuk Modal
                const originalIndex = squadData.pemain.findIndex(orig => orig === p);
                
                return `
                <div onclick="showPlayerDetail(${originalIndex})" class="glass-card rounded-[2.5rem] p-5 flex items-center gap-5 relative overflow-hidden group">
                    <div class="absolute -right-4 -bottom-4 text-7xl font-black text-brand-black/5 dark:text-white/5 italic">${val(p.nomor, '00')}</div>
                    <div class="w-20 h-20 rounded-3xl overflow-hidden bg-gray-100 dark:bg-white/10 shrink-0 border border-gray-200 dark:border-white/10">
                        <img src="${val(p.link_foto, 'https://via.placeholder.com/200')}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0 z-10">
                        <h4 class="text-base font-black uppercase tracking-tighter truncate text-brand-black dark:text-white">${val(p.nama, 'Nama Pemain')}</h4>
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[9px] font-bold bg-brand-blue/10 text-brand-blue px-2 py-0.5 rounded-full uppercase">${val(p.posisi, 'Posisi')}</span>
                            <span class="text-[9px] text-gray-500 font-bold uppercase truncate">${val(p.sekolah, 'Asal Sekolah')}</span>
                        </div>
                        <div class="flex gap-4">
                            <div class="text-center"><p class="text-[7px] text-gray-500 uppercase font-bold">Gol</p><p class="text-xs font-black text-brand-gold">${val(p.gol, 0)}</p></div>
                            <div class="text-center"><p class="text-[7px] text-gray-500 uppercase font-bold">Kategori</p><p class="text-xs font-black text-brand-black dark:text-white">${val(p.kategori, '-')}</p></div>
                        </div>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        // ==========================================
        // MESIN PENCARI & FILTER (BERJALAN PARALEL)
        // ==========================================
        function setPosFilter(pos, btnElement) {
            activeFilter = pos;

            // Reset visual semua tombol
            document.querySelectorAll('.pos-btn').forEach(b => {
                b.classList.remove('bg-brand-blue', 'text-white', 'shadow-lg', 'shadow-brand-blue/20');
                b.classList.add('bg-white', 'dark:bg-white/5', 'text-gray-400', 'border-gray-200', 'dark:border-white/10');
            });

            // Aktifkan visual tombol yang ditekan
            btnElement.classList.remove('bg-white', 'dark:bg-white/5', 'text-gray-400', 'border-gray-200', 'dark:border-white/10');
            btnElement.classList.add('bg-brand-blue', 'text-white', 'shadow-lg', 'shadow-brand-blue/20');

            jalankanPencarian(); // Terapkan filter langsung
        }

        function jalankanPencarian() {
            const query = document.getElementById('playerSearch').value.toLowerCase().trim();

            const filtered = squadData.pemain.filter(p => {
                // 1. Logika Teks (Nama/Sekolah)
                const searchTxt = (val(p.nama) + " " + val(p.sekolah)).toLowerCase();
                const matchSearch = searchTxt.includes(query);
                
                // 2. Logika Posisi Pintar
                const posTxt = val(p.posisi).toUpperCase();
                let broadPos = 'LAINNYA';
                if (posTxt.includes('GAWANG') || posTxt.includes('KIPER') || posTxt === 'GK') broadPos = 'GK';
                else if (posTxt.includes('BEK') || posTxt.includes('DEFENDER') || posTxt.includes('BACK') || ['CB','RB','LB','RWB','LWB'].includes(posTxt)) broadPos = 'DEF';
                else if (posTxt.includes('GELANDANG') || posTxt.includes('MIDFIELD') || ['CM','CDM','CAM','RM','LM'].includes(posTxt)) broadPos = 'MID';
                else if (posTxt.includes('PENYERANG') || posTxt.includes('SAYAP') || posTxt.includes('STRIKER') || ['ST','CF','RW','LW','SS'].includes(posTxt)) broadPos = 'FWD';

                const matchPos = activeFilter === 'ALL' || broadPos === activeFilter;

                // Tampilkan hanya jika cocok teks DAN cocok posisi
                return matchSearch && matchPos;
            });

            renderPlayers(filtered);
        }

        // Listener Instan: Mencari setiap kali tombol keyboard ditekan
        document.getElementById('playerSearch').addEventListener('input', jalankanPencarian);

        // ==========================================
        // MODAL LOGIC
        // ==========================================
        function showPlayerDetail(index) {
            const p = squadData.pemain[index];
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div class="relative">
                    <button onclick="closeModal()" class="absolute top-6 right-6 z-20 bg-black/40 text-white p-2 rounded-full hover:bg-black/60"><i data-lucide="x" class="w-5 h-5"></i></button>
                    <div class="h-48 bg-gradient-to-b from-brand-blue/40 to-transparent absolute inset-0"></div>
                    <div class="p-8 relative z-10 text-center">
                        <img src="${val(p.link_foto, 'https://via.placeholder.com/200')}" class="w-32 h-32 mx-auto rounded-[2.5rem] object-cover border-4 border-brand-blue shadow-2xl mb-4">
                        <h2 class="text-2xl font-black uppercase tracking-tighter text-white">${val(p.nama, 'Nama Pemain')}</h2>
                        <p class="text-brand-blue font-bold tracking-[0.3em] uppercase text-[10px] mb-6">${val(p.posisi, 'Posisi')} • ${val(p.posisi_alt, 'None')}</p>
                        
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                                <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Kaki Dominan</p>
                                <p class="text-sm font-black uppercase text-white">${val(p.kaki, '-')}</p>
                            </div>
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                                <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Total Gol</p>
                                <p class="text-sm font-black text-brand-gold">${val(p.gol, 0)}</p>
                            </div>
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                                <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Fisik (T/B)</p>
                                <p class="text-sm font-black text-white">${val(p.tinggi, '-')}cm / ${val(p.berat, '-')}kg</p>
                            </div>
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                                <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Kategori</p>
                                <p class="text-sm font-black uppercase text-white">${val(p.kategori, '-')}</p>
                            </div>
                        </div>
                        <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                            <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Instansi / Sekolah</p>
                            <p class="text-xs font-bold italic text-gray-300">"${val(p.sekolah, 'Belum Terdaftar')}"</p>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('playerModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('playerModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
