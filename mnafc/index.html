<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MNA FC | Database Skuad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#2563eb',
                        'brand-gold': '#d7b67d',
                        'brand-dark-bg': '#09090b',
                    }
                }
            }
        }
    </script>
    <style>
        .glass-main { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; cursor: pointer; }
        .glass-card:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-3px); border-color: #2563eb; }
        .glass-modal { background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .modal-enter { animation: modalIn 0.3s ease-out forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="bg-white dark:bg-brand-dark-bg text-gray-900 dark:text-white transition-colors duration-500 pb-24">

    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-brand-dark-bg/80 backdrop-blur-md border-b border-gray-200 dark:border-white/10 pt-safe">
        <div class="max-w-3xl mx-auto px-5 h-16 flex items-center justify-between">
            <h1 class="font-black text-xl italic">MNA <span class="text-brand-blue">FC</span></h1>
            <span class="text-[9px] font-bold py-1 px-3 bg-brand-blue/10 text-brand-blue rounded-full uppercase tracking-widest">Command Center</span>
        </div>
    </header>

    <main class="pt-24 px-5 max-w-3xl mx-auto">
        <div id="team-stats" class="glass-main rounded-[2rem] p-6 mb-8 grid grid-cols-3 gap-4 border border-gray-100 dark:border-white/5">
            <div class="text-center">
                <p id="win-rate" class="text-2xl font-black text-brand-blue">0%</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Win Rate</p>
            </div>
            <div class="text-center border-x border-gray-100 dark:border-white/10">
                <p id="match-record" class="text-2xl font-black text-brand-black dark:text-white transition-colors">0-0-0</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">W - D - L</p>
            </div>
            <div class="text-center">
                <p id="goal-diff" class="text-2xl font-black text-brand-gold">+0</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Goal Diff</p>
            </div>
        </div>

        <div class="mb-6 sticky top-20 z-40 bg-white dark:bg-brand-dark-bg/95 py-4 transition-colors">
            <input type="text" id="playerSearch" placeholder="Cari nama atau sekolah..." 
                class="w-full bg-gray-100 dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-2xl py-3 px-5 text-sm mb-4 outline-none focus:ring-2 focus:ring-brand-blue transition-all">
            <div class="flex gap-2 overflow-x-auto hide-scroll pb-2" id="posFilter">
                <button onclick="filterPos('ALL')" class="pos-btn active bg-brand-blue text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase">ALL</button>
                <button onclick="filterPos('GK')" class="pos-btn bg-gray-100 dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase">GK</button>
                <button onclick="filterPos('DEF')" class="pos-btn bg-gray-100 dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase">DEF</button>
                <button onclick="filterPos('MID')" class="pos-btn bg-gray-100 dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase">MID</button>
                <button onclick="filterPos('FWD')" class="pos-btn bg-gray-100 dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase">FWD</button>
            </div>
        </div>

        <div id="playerGrid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <nav id="main-bottom-nav" class="fixed bottom-0 w-full z-[110] bg-white/90 dark:bg-[#09090b]/90 backdrop-blur-xl border-t border-gray-200 dark:border-white/10 pb-safe transition-colors duration-500">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto px-2">
            <a href="/" class="flex flex-col items-center justify-center w-full h-full text-gray-400 dark:text-gray-500 hover:text-brand-gold transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5 md:w-6 md:h-6 mb-1"></i>
                <span class="text-[8px] md:text-[9px] font-bold uppercase tracking-wider">Operator</span>
            </a>
            <a href="/tsl/" class="flex flex-col items-center justify-center w-full h-full text-gray-400 dark:text-gray-500 hover:text-brand-green transition-colors">
                <i data-lucide="trophy" class="w-5 h-5 md:w-6 md:h-6 mb-1"></i>
                <span class="text-[8px] md:text-[9px] font-bold uppercase tracking-wider">TSL Liga</span>
            </a>
            <button class="flex flex-col items-center justify-center w-full h-full text-brand-blue transition-colors">
                <i data-lucide="shield" class="w-5 h-5 md:w-6 md:h-6 mb-1"></i>
                <span class="text-[8px] md:text-[9px] font-bold uppercase tracking-wider">MNA FC</span>
            </button>
            <a href="/tsl/#pencarian" class="flex flex-col items-center justify-center w-full h-full text-gray-400 dark:text-gray-500 hover:text-brand-black dark:hover:text-white transition-colors">
                <i data-lucide="search" class="w-5 h-5 md:w-6 md:h-6 mb-1"></i>
                <span class="text-[8px] md:text-[9px] font-bold uppercase tracking-wider">Cari</span>
            </a>
        </div>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzZsFD9aNzjzBY5AT9wZnc3wMFVoQ60FTjUGyNCxC08H3gGa17GO3MHtI63MNP0JBAkvg/exec'; // Masukkan URL Apps Script
        let squadData = { pemain: [], statistik: {} };

        async function init() {
            // 1. LOAD DARI CACHE (INSTAN 0 DETIK)
            const cacheData = localStorage.getItem('mnafc_cache_squad');
            if (cacheData) {
                try {
                    squadData = JSON.parse(cacheData);
                    updateTeamDashboard(squadData.statistik);
                    renderPlayers(squadData.pemain);
                } catch (e) { console.error("Gagal membaca cache:", e); }
            }

            // 2. AMBIL DATA BARU DI LATAR BELAKANG (SILENT UPDATE)
            try {
                const res = await fetch(`${API_URL}?t=${Date.now()}`); // Tambah timestamp agar tidak kena cache browser
                const newData = await res.json();
                
                // Simpan data terbaru ke memori HP
                localStorage.setItem('mnafc_cache_squad', JSON.stringify(newData));
                
                // Perbarui tampilan dengan data fresh tanpa reload
                squadData = newData;
                updateTeamDashboard(squadData.statistik);
                renderPlayers(squadData.pemain);
                
            } catch (err) {
                console.error("Gagal menyinkronkan data terbaru:", err);
                // Jika cache kosong dan internet mati, baru tampilkan error
                if (!cacheData) {
                    document.getElementById('playerGrid').innerHTML = `<p class="text-center py-10 text-red-500 font-bold text-xs uppercase">Gagal Memuat Data</p>`;
                }
            }
            lucide.createIcons();
        }

        function updateTeamDashboard(s) {
            if(!s) return;
            const total = (s.menang || 0) + (s.seri || 0) + (s.kalah || 0);
            const wr = total > 0 ? Math.round((s.menang / total) * 100) : 0;
            document.getElementById('win-rate').innerText = wr + '%';
            document.getElementById('match-record').innerText = `${s.menang || 0}-${s.seri || 0}-${s.kalah || 0}`;
            document.getElementById('goal-diff').innerText = ((s.gol_masuk - s.gol_kemasukan) >= 0 ? '+' : '') + (s.gol_masuk - s.gol_kemasukan || 0);
        }

        function renderPlayers(list) {
            const grid = document.getElementById('playerGrid');
            grid.innerHTML = list.map((p, index) => `
                <div onclick="showPlayerDetail(${index})" class="glass-card rounded-[2.5rem] p-5 flex items-center gap-5 relative overflow-hidden group">
                    <div class="absolute -right-4 -bottom-4 text-7xl font-black text-brand-black/5 dark:text-white/5 italic transition-colors">${p.nomor}</div>
                    <div class="w-20 h-20 rounded-3xl overflow-hidden bg-gray-100 dark:bg-white/10 shrink-0 border border-gray-200 dark:border-white/10">
                        <img src="${p.link_foto || 'https://via.placeholder.com/200'}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0 z-10">
                        <h4 class="text-base font-black uppercase tracking-tighter truncate">${p.nama}</h4>
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[9px] font-bold bg-brand-blue/10 text-brand-blue px-2 py-0.5 rounded-full uppercase">${p.posisi}</span>
                            <span class="text-[9px] text-gray-500 font-bold uppercase truncate">${p.sekolah}</span>
                        </div>
                        <div class="flex gap-4">
                            <div class="text-center"><p class="text-[7px] text-gray-500 uppercase font-bold">Poin</p><p class="text-xs font-black text-brand-gold">${p.gol}</p></div>
                            <div class="text-center"><p class="text-[7px] text-gray-500 uppercase font-bold">Nomor</p><p class="text-xs font-black">#${p.nomor}</p></div>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function showPlayerDetail(index) {
            const p = squadData.pemain[index];
            const modal = document.getElementById('playerModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div class="relative">
                    <button onclick="closeModal()" class="absolute top-6 right-6 z-20 bg-black/20 text-white p-2 rounded-full hover:bg-black/40"><i data-lucide="x" class="w-5 h-5"></i></button>
                    <div class="h-48 bg-gradient-to-b from-brand-blue/40 to-transparent absolute inset-0"></div>
                    <div class="p-8 relative z-10 text-center">
                        <img src="${p.link_foto || 'https://via.placeholder.com/200'}" class="w-32 h-32 mx-auto rounded-[2.5rem] object-cover border-4 border-brand-blue shadow-2xl mb-4">
                        <h2 class="text-2xl font-black uppercase tracking-tighter">${p.nama}</h2>
                        <p class="text-brand-blue font-bold tracking-[0.3em] uppercase text-[10px] mb-6">${p.posisi} • ${p.posisi_alt || 'None'}</p>
                        
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                                <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Kaki Dominan</p>
                                <p class="text-sm font-black uppercase">${p.kaki}</p>
                            </div>
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                                <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Total Gol</p>
                                <p class="text-sm font-black text-brand-gold">${p.gol}</p>
                            </div>
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                                <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Fisik (T/B)</p>
                                <p class="text-sm font-black">${p.tinggi}cm / ${p.berat}kg</p>
                            </div>
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                                <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Kategori</p>
                                <p class="text-sm font-black uppercase">${p.kategori}</p>
                            </div>
                        </div>

                        <div class="bg-white/5 rounded-2xl p-4 border border-white/5 text-left">
                            <p class="text-[8px] text-gray-500 uppercase font-bold mb-1 text-center">Asal Instansi / Sekolah</p>
                            <p class="text-xs font-bold text-center italic text-gray-300">"${p.sekolah}"</p>
                        </div>
                    </div>
                </div>
            `;
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Lock scroll
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('playerModal').classList.add('hidden');
            document.body.style.overflow = ''; // Unlock scroll
        }

        function filterPos(pos) {
            const query = document.getElementById('playerSearch').value.toLowerCase();
            
            // MESIN PEMETAAN POSISI (Berdasarkan Standar Tim Profesional MNA)
            const getBroadPos = (detailedPos) => {
                let p = String(detailedPos).toUpperCase().replace(/\s+/g, '');
                // 1. Goalkeeper
                if(['GK','KIPER'].includes(p)) return 'GK';
                // 2. Defender (CB, RB, LB, RWB, LWB)
                if(['CB','RB','LB','RWB','LWB','DEF','BEK'].includes(p)) return 'DEF';
                // 3. Midfielder (CDM, CM, CAM, RM, LM)
                if(['CM','CDM','CAM','RM','LM','MID','TENGAH'].includes(p)) return 'MID';
                // 4. Forward / Penyerang (ST, CF, SS, RW, LW)
                if(['ST','CF','SS','RW','LW','FWD','DEPAN','PENYERANG'].includes(p)) return 'FWD';
                
                return 'LAINNYA';
            };

            const filtered = squadData.pemain.filter(p => {
                const mSearch = p.nama.toLowerCase().includes(query) || p.sekolah.toLowerCase().includes(query);
                // Bandingkan posisi yang sudah dibungkus dengan tombol filter yang ditekan
                const mPos = pos === 'ALL' || getBroadPos(p.posisi) === pos;
                return mSearch && mPos;
            });
            
            renderPlayers(filtered);
            
            // Perbarui visual tombol yang aktif
            document.querySelectorAll('.pos-btn').forEach(b => {
                b.classList.remove('bg-brand-blue', 'text-white');
                b.classList.add('bg-gray-100', 'dark:bg-white/5', 'text-gray-400');
            });
            event.target.classList.add('bg-brand-blue', 'text-white');
            event.target.classList.remove('text-gray-400');
        }

        document.getElementById('playerSearch').addEventListener('input', () => filterPos('ALL'));
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
