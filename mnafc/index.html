<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MNA FC | Database Skuad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#2563eb',
                        'brand-gold': '#d7b67d',
                        'brand-dark-bg': '#09090b',
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        html:not(.dark) .glass-card { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 0, 0, 0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white dark:bg-brand-dark-bg text-gray-900 dark:text-white transition-colors duration-500 pb-24">

    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-brand-dark-bg/80 backdrop-blur-md border-b border-gray-200 dark:border-white/10 pt-safe">
        <div class="max-w-3xl mx-auto px-5 h-16 flex items-center justify-between">
            <h1 class="font-black text-xl tracking-tighter uppercase italic">MNA <span class="text-brand-blue">FC</span></h1>
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-bold py-1 px-2 bg-brand-blue/10 text-brand-blue rounded-full uppercase tracking-widest">Database Skuad</span>
            </div>
        </div>
    </header>

    <main class="pt-28 px-5 max-w-3xl mx-auto">
        <div class="mb-8 sticky top-24 z-40 bg-white dark:bg-brand-dark-bg/95 py-2">
            <div class="relative mb-4">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input type="text" id="playerSearch" placeholder="Cari nama pemain atau sekolah..." 
                    class="w-full bg-gray-100 dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-2xl py-3 pl-12 pr-4 text-sm focus:ring-2 focus:ring-brand-blue transition-all">
            </div>
            
            <div class="flex gap-2 overflow-x-auto hide-scroll pb-2" id="posFilter">
                <button onclick="filterPos('ALL')" class="pos-btn active px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest bg-brand-blue text-white shadow-lg shadow-brand-blue/20">ALL</button>
                <button onclick="filterPos('GK')" class="pos-btn px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest bg-gray-100 dark:bg-white/5 text-gray-500">GK</button>
                <button onclick="filterPos('DEF')" class="pos-btn px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest bg-gray-100 dark:bg-white/5 text-gray-500">DEF</button>
                <button onclick="filterPos('MID')" class="pos-btn px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest bg-gray-100 dark:bg-white/5 text-gray-500">MID</button>
                <button onclick="filterPos('FWD')" class="pos-btn px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest bg-gray-100 dark:bg-white/5 text-gray-500">FWD</button>
            </div>
        </div>

        <div id="playerGrid" class="grid grid-cols-1 gap-4">
            <div class="py-20 text-center animate-pulse">
                <i data-lucide="refresh-cw" class="w-8 h-8 mx-auto text-gray-400 animate-spin mb-4"></i>
                <p class="text-xs font-bold uppercase tracking-widest text-gray-500">Mengunduh Database...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full z-50 bg-white/90 dark:bg-[#09090b]/90 backdrop-blur-xl border-t border-gray-200 dark:border-white/10 pb-safe">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto px-2">
            <a href="/" class="flex flex-col items-center text-gray-400">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mb-1"></i>
                <span class="text-[8px] font-bold uppercase">Operator</span>
            </a>
            <div class="flex flex-col items-center text-brand-blue">
                <i data-lucide="shield" class="w-5 h-5 mb-1"></i>
                <span class="text-[8px] font-bold uppercase">MNA FC</span>
            </div>
        </div>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyM8vOysl4XypFzfmRSzvtb2MyZbtXzqXIaA_Av_vXrzJvyoniiRa5s3DCS965Tbt6nmQ/exec';
        let allPlayers = [];

        async function initDatabase() {
            try {
                const res = await fetch(API_URL);
                allPlayers = await res.json();
                renderPlayers(allPlayers);
            } catch (err) {
                document.getElementById('playerGrid').innerHTML = `<p class="text-center py-10 text-red-500 font-bold text-xs uppercase">Gagal Memuat Data</p>`;
            }
            lucide.createIcons();
        }

        function renderPlayers(players) {
            const grid = document.getElementById('playerGrid');
            grid.innerHTML = players.map(p => `
                <div class="glass-card rounded-[2rem] p-5 flex items-center gap-5 hover:scale-[1.02] transition-transform">
                    <div class="relative shrink-0">
                        <div class="w-20 h-20 rounded-2xl overflow-hidden bg-gray-200 dark:bg-white/10">
                            <img src="${p.link_foto || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                        </div>
                        <div class="absolute -bottom-2 -right-2 bg-brand-blue text-white w-8 h-8 rounded-lg flex items-center justify-center font-black text-sm border-2 border-white dark:border-brand-dark-bg">
                            ${p.nomor || '0'}
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start mb-1">
                            <div>
                                <h4 class="font-black text-base uppercase leading-tight truncate">${p.nama}</h4>
                                <p class="text-[10px] font-bold text-brand-blue uppercase tracking-widest">${p.posisi} ${p.posisi_alt ? '• '+p.posisi_alt : ''}</p>
                            </div>
                            <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">${p.kategori}</span>
                        </div>
                        <div class="flex gap-4 mt-3 pt-3 border-t border-gray-100 dark:border-white/5">
                            <div class="text-center"><p class="text-[8px] text-gray-500 font-bold uppercase">Kaki</p><p class="text-xs font-black uppercase">${p.kaki}</p></div>
                            <div class="text-center"><p class="text-[8px] text-gray-500 font-bold uppercase">Tinggi</p><p class="text-xs font-black">${p.tinggi}cm</p></div>
                            <div class="text-center"><p class="text-[8px] text-gray-500 font-bold uppercase">Gol</p><p class="text-xs font-black text-brand-gold">${p.gol}</p></div>
                        </div>
                    </div>
                </div>
            `).join('');
            if(players.length === 0) grid.innerHTML = `<p class="text-center py-20 text-gray-500 font-bold text-xs uppercase">Pemain Tidak Ditemukan</p>`;
            lucide.createIcons();
        }

        // Filter & Search Logic
        let activePos = 'ALL';
        const searchInput = document.getElementById('playerSearch');

        function filterPos(pos) {
            activePos = pos;
            document.querySelectorAll('.pos-btn').forEach(btn => {
                btn.classList.remove('bg-brand-blue', 'text-white', 'shadow-lg');
                btn.classList.add('bg-gray-100', 'dark:bg-white/5', 'text-gray-500');
            });
            event.target.classList.replace('bg-gray-100', 'bg-brand-blue');
            event.target.classList.replace('text-gray-500', 'text-white');
            applyFilters();
        }

        function applyFilters() {
            const query = searchInput.value.toLowerCase();
            const filtered = allPlayers.filter(p => {
                const matchSearch = p.nama.toLowerCase().includes(query) || p.sekolah.toLowerCase().includes(query);
                const matchPos = activePos === 'ALL' || p.posisi === activePos;
                return matchSearch && matchPos;
            });
            renderPlayers(filtered);
        }

        searchInput.addEventListener('input', applyFilters);
        window.addEventListener('DOMContentLoaded', initDatabase);
    </script>
</body>
</html>
