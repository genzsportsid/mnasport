<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script src="https://cdn.jsdelivr.net/npm/lucide@<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MNA FC | Elite Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#1d4ed8',
                        'brand-neon': '#3b82f6',
                        'brand-gold': '#d7b67d',
                        'brand-dark': '#050505',
                        'brand-surface': '#111111',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #050505; color: #ffffff; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(17, 17, 17, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .player-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .player-card:hover { transform: translateY(-8px) scale(1.02); border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 15px 30px -10px rgba(59, 130, 246, 0.2); z-index: 10;}
        
        .modal-enter { animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        
        .stagger-item { animation: fadeUp 0.5s ease forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* Tactical Pitch Design */
        .pitch-container { position: relative; width: 100%; height: 180px; background: rgba(59, 130, 246, 0.05); border: 1.5px solid rgba(59, 130, 246, 0.2); border-radius: 12px; overflow: hidden; }
        .pitch-container.large { height: 250px; border-radius: 24px; }
        .pitch-line { position: absolute; border: 1px solid rgba(59, 130, 246, 0.15); }
        .pitch-half { top: 0; left: 0; width: 100%; height: 50%; border-bottom: 1px solid rgba(59, 130, 246, 0.2); }
        .pitch-circle { top: 50%; left: 50%; width: 50px; height: 50px; border-radius: 50%; transform: translate(-50%, -50%); }
        .pitch-penalty { top: 0; left: 25%; width: 50%; height: 20%; border: 1px solid rgba(59, 130, 246, 0.2); border-top: 0; }
        .pitch-penalty-bottom { bottom: 0; left: 25%; width: 50%; height: 20%; border: 1px solid rgba(59, 130, 246, 0.2); border-bottom: 0; }
        
        /* Marker Diperbesar dengan Teks */
        .player-marker { 
            position: absolute; 
            width: 36px; height: 36px; 
            background: #3b82f6; 
            border: 2px solid white; 
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
            box-shadow: 0 0 15px #3b82f6; 
            transition: all 1s ease; 
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900; color: white; text-shadow: 0px 1px 2px rgba(0,0,0,0.8);
            z-index: 10;
        }

        /* Halaman Baru Animasi Slide */
        .page-slide-in { transform: translateX(0) !important; }
    </style>
</head>
<body class="bg-[#F9FAFB] dark:bg-brand-dark pb-32 transition-colors duration-500">

    <header class="fixed top-0 w-full z-50 glass-panel border-b border-gray-200 dark:border-white/5 pt-safe">
        <div class="max-w-4xl mx-auto px-5 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-blue to-brand-neon flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                    <span class="font-black text-white text-xs tracking-tighter">FC</span>
                </div>
                <h1 class="font-black text-xl italic tracking-tighter uppercase text-brand-dark dark:text-white">MNA <span class="text-brand-blue dark:text-brand-neon">SPORT</span></h1>
            </div>
            <div class="flex bg-gray-100 dark:bg-white/5 p-1 rounded-xl">
                <button onclick="switchMode('squad')" id="tab-squad" class="px-4 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-lg bg-white dark:bg-brand-surface text-brand-blue dark:text-white shadow-sm transition-all">Squad</button>
                <button onclick="switchMode('gallery')" id="tab-gallery" class="px-4 py-1.5 text-[10px] font-bold uppercase tracking-widest text-gray-500 hover:text-brand-dark dark:hover:text-white transition-all">Media</button>
            </div>
        </div>
    </header>

    <main class="pt-24 px-5 max-w-4xl mx-auto">
        <div class="glass-panel rounded-3xl p-6 md:p-8 mb-8 border border-gray-200 dark:border-white/5 relative overflow-hidden">
            <div class="absolute -right-20 -top-20 w-64 h-64 bg-brand-blue/20 blur-[80px] rounded-full pointer-events-none"></div>
            <p class="text-[9px] font-black text-gray-400 uppercase tracking-[0.3em] mb-4 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Tactical Stats
            </p>
            <div class="grid grid-cols-3 gap-4 md:gap-8 divide-x divide-gray-200 dark:divide-white/10">
                <div><p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Win Rate</p><p id="win-rate" class="text-3xl md:text-5xl font-black text-brand-neon tracking-tighter">0%</p></div>
                <div class="pl-4 md:pl-8"><p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">W-S-K</p><p id="match-record" class="text-3xl md:text-5xl font-black text-brand-dark dark:text-white tracking-tighter">0-0-0</p></div>
                <div class="pl-4 md:pl-8"><p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Goal Diff</p><p id="goal-diff" class="text-3xl md:text-5xl font-black text-brand-gold tracking-tighter">+0</p></div>
            </div>
        </div>

        <div id="view-squad" class="block animate-fade-in">
            <div class="sticky top-16 z-40 bg-[#F9FAFB]/90 dark:bg-brand-dark/90 backdrop-blur-xl py-4 -mx-5 px-5 mb-4 border-b border-gray-100 dark:border-white/5">
                <div class="relative flex-1 mb-4">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <input type="text" id="playerSearch" oninput="runFilter()" placeholder="Cari nama, posisi, atau sekolah..." 
                        class="w-full bg-white dark:bg-brand-surface border border-gray-200 dark:border-white/10 rounded-2xl py-3 pl-12 pr-4 text-sm font-medium outline-none focus:border-brand-neon transition-colors shadow-sm text-brand-dark dark:text-white placeholder-gray-400">
                </div>
                <div class="flex gap-2 overflow-x-auto hide-scroll pb-1">
                    <button onclick="setPosFilter('ALL', this)" class="pos-btn border-brand-neon text-brand-blue dark:text-brand-neon bg-blue-50 dark:bg-brand-blue/10 px-6 py-2 rounded-xl text-[10px] font-black uppercase border shadow-sm transition-all">Semua</button>
                    <button onclick="setPosFilter('GK', this)" class="pos-btn border-gray-200 dark:border-white/10 text-gray-500 bg-white dark:bg-brand-surface px-6 py-2 rounded-xl text-[10px] font-bold uppercase border transition-all">GK</button>
                    <button onclick="setPosFilter('DEF', this)" class="pos-btn border-gray-200 dark:border-white/10 text-gray-500 bg-white dark:bg-brand-surface px-6 py-2 rounded-xl text-[10px] font-bold uppercase border transition-all">DEF</button>
                    <button onclick="setPosFilter('MID', this)" class="pos-btn border-gray-200 dark:border-white/10 text-gray-500 bg-white dark:bg-brand-surface px-6 py-2 rounded-xl text-[10px] font-bold uppercase border transition-all">MID</button>
                    <button onclick="setPosFilter('FWD', this)" class="pos-btn border-gray-200 dark:border-white/10 text-gray-500 bg-white dark:bg-brand-surface px-6 py-2 rounded-xl text-[10px] font-bold uppercase border transition-all">FWD</button>
                </div>
            </div>
            <div id="playerGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>

        <div id="view-gallery" class="hidden animate-fade-in">
            <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5"></div>
        </div>
    </main>

    <div id="playerModal" class="fixed inset-0 z-[150] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-brand-dark/95 backdrop-blur-xl" onclick="closeModal()"></div>
        <div id="modalContent" class="w-full max-w-sm glass-panel border border-white/10 rounded-[2.5rem] overflow-hidden relative z-10 modal-enter shadow-2xl">
            </div>
    </div>

    <div id="fullProfilePage" class="fixed inset-0 z-[200] hidden bg-brand-dark overflow-y-auto overflow-x-hidden transition-transform duration-500 translate-x-full">
        </div>

    <nav class="fixed bottom-0 w-full z-[110] bg-white/95 dark:bg-brand-surface/95 backdrop-blur-2xl border-t border-gray-200 dark:border-white/5 pb-safe transition-colors">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto px-2">
            <a href="/" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-brand-gold transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Operator</span>
            </a>
            <a href="/tsl/" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-green-500 transition-colors">
                <i data-lucide="trophy" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">TSL Liga</span>
            </a>
            <button class="flex flex-col items-center justify-center w-full h-full text-brand-blue dark:text-brand-neon transition-colors">
                <i data-lucide="shield" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">MNA FC</span>
            </button>
        </div>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbw993ZoUft52Da4SWg-9l4rDFDxk0O_bjH-0_gzmBMOCJm4PGL-rPfJO5wWtJVzsf47SQ/exec'; 
        let rawData = { pemain: [], statistik: {}, galeri: [] };
        let activePos = 'ALL';

        const val = (data, fallback = "-") => (data === "" || data === null || data === undefined) ? fallback : data;

        // Koordinat Posisi di Lapangan
        function getPosCoords(pos) {
            const p = val(pos).toUpperCase();
            const positions = {
                'GK': { bottom: '5%', left: '50%' },
                'CB': { bottom: '20%', left: '50%' },
                'LB': { bottom: '25%', left: '15%' },
                'RB': { bottom: '25%', left: '85%' },
                'LWB': { bottom: '35%', left: '10%' },
                'RWB': { bottom: '35%', left: '90%' },
                'RB/LB': { bottom: '25%', left: '50%' },
                'RWB/LWB': { bottom: '35%', left: '50%' },
                'CM': { bottom: '50%', left: '50%' },
                'CDM': { bottom: '40%', left: '50%' },
                'CAM': { bottom: '65%', left: '50%' },
                'RM': { bottom: '55%', left: '85%' },
                'LM': { bottom: '55%', left: '15%' },
                'RM/LM': { bottom: '55%', left: '50%' },
                'ST': { bottom: '85%', left: '50%' },
                'CF': { bottom: '80%', left: '50%' },
                'LW': { bottom: '80%', left: '15%' },
                'RW': { bottom: '80%', left: '85%' },
                'SS': { bottom: '75%', left: '50%' },
                'RW/LW': { bottom: '80%', left: '50%' }
            };
            return positions[p] || { bottom: '50%', left: '50%' };
        }

        async function init() {
            const cache = localStorage.getItem('mnafc_elite_final');
            if (cache) { rawData = JSON.parse(cache); updateUI(); }
            try {
                const res = await fetch(`${API_URL}?t=${Date.now()}`);
                const data = await res.json();
                rawData = data;
                localStorage.setItem('mnafc_elite_final', JSON.stringify(data));
                updateUI();
            } catch (e) { console.error(e); }
            lucide.createIcons();
        }

        function updateUI() {
            renderStats(rawData.statistik);
            runFilter();
            renderGallery(rawData.galeri);
        }

        function renderStats(s) {
            if(!s) return;
            const m = parseInt(val(s.menang, 0)), s_ = parseInt(val(s.seri, 0)), k = parseInt(val(s.kalah, 0));
            const total = m + s_ + k;
            document.getElementById('win-rate').innerText = (total > 0 ? Math.round((m/total)*100) : 0) + '%';
            document.getElementById('match-record').innerText = `${m}-${s_}-${k}`;
            const diff = parseInt(val(s.gol_masuk, 0)) - parseInt(val(s.gol_kemasukan, 0));
            document.getElementById('goal-diff').innerText = (diff > 0 ? '+' : '') + diff;
        }

        function renderPlayers(list) {
            const grid = document.getElementById('playerGrid');
            if (list.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-16 text-center text-[10px] font-black text-gray-500 uppercase tracking-widest border border-dashed border-gray-300 dark:border-white/10 rounded-2xl">Tidak ada data</div>`;
                return;
            }
            grid.innerHTML = list.map((p, i) => {
                const originalIdx = rawData.pemain.findIndex(orig => orig === p);
                return `
                <div onclick="showPlayerDetail(${originalIdx})" class="player-card glass-panel rounded-2xl p-4 flex items-center gap-4 relative overflow-hidden cursor-pointer stagger-item" style="animation-delay: ${i*0.05}s">
                    <div class="absolute -right-2 -bottom-6 text-8xl font-black italic text-brand-dark/5 dark:text-white/5 pointer-events-none">${val(p.nomor, '00')}</div>
                    <div class="w-20 h-20 rounded-xl overflow-hidden bg-gray-200 dark:bg-white/10 shrink-0 border border-white/10 relative z-10">
                        <img src="${val(p.link_foto, 'https://via.placeholder.com/200')}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0 z-10">
                        <div class="flex justify-between items-start mb-1">
                            <div>
                                <h4 class="text-sm font-black uppercase tracking-tight text-brand-dark dark:text-white truncate">${val(p.nama, 'Pemain')}</h4>
                                <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest truncate block">${val(p.sekolah, 'Instansi')}</span>
                            </div>
                            <span class="text-[10px] font-black bg-brand-neon/20 text-brand-neon px-2 py-1 rounded shadow-sm border border-brand-neon/20">${val(p.posisi, 'POS')}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-3 pt-3 border-t border-gray-200 dark:border-white/5">
                            <div><p class="text-[7px] text-gray-400 uppercase font-black tracking-widest">Kategori</p><p class="text-[11px] font-bold text-brand-dark dark:text-white uppercase">${val(p.kategori, '-')}</p></div>
                            <div><p class="text-[7px] text-gray-400 uppercase font-black tracking-widest">Gol / Poin</p><p class="text-[11px] font-black text-brand-gold">${val(p.gol, 0)}</p></div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function runFilter() {
            const query = document.getElementById('playerSearch').value.toLowerCase();
            const filtered = rawData.pemain.filter(p => {
                const searchStr = (val(p.nama) + val(p.sekolah) + val(p.posisi)).toLowerCase();
                const matchTxt = searchStr.includes(query);
                
                const pos = val(p.posisi).toUpperCase();
                let bPos = 'LAINNYA';
                
                if (['GK'].includes(pos)) bPos = 'GK';
                else if (['CB','LB','RB','RWB','LWB','RB/LB','RWB/LWB'].includes(pos)) bPos = 'DEF';
                else if (['CM','CDM','CAM','RM','LM','RM/LM'].includes(pos)) bPos = 'MID';
                else if (['ST','CF','RW','LW','SS','RW/LW'].includes(pos)) bPos = 'FWD';

                return matchTxt && (activePos === 'ALL' || bPos === activePos);
            });
            renderPlayers(filtered);
        }

        function setPosFilter(pos, btn) {
            activePos = pos;
            document.querySelectorAll('.pos-btn').forEach(b => {
                b.className = "pos-btn border-gray-200 dark:border-white/10 text-gray-500 bg-white dark:bg-brand-surface px-6 py-2 rounded-xl text-[10px] font-bold uppercase border transition-all";
            });
            btn.className = "pos-btn border-brand-neon text-brand-blue dark:text-brand-neon bg-blue-50 dark:bg-brand-blue/10 px-6 py-2 rounded-xl text-[10px] font-black uppercase border shadow-sm transition-all";
            runFilter();
        }

        // Preview Cepat (Modal)
        function showPlayerDetail(idx) {
            const p = rawData.pemain[idx];
            
            document.getElementById('modalContent').innerHTML = `
                <div class="relative bg-brand-surface border border-white/10 rounded-[2.5rem] overflow-hidden pb-6">
                    <button onclick="closeModal()" class="absolute top-5 right-5 z-[100] bg-black/50 text-white p-2 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
                    
                    <div class="h-32 bg-gradient-to-br from-brand-blue to-brand-neon relative">
                        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-30"></div>
                        <div class="absolute -bottom-12 left-8 w-24 h-24 rounded-2xl overflow-hidden border-4 border-brand-surface shadow-2xl bg-brand-surface">
                            <img src="${val(p.link_foto, 'https://via.placeholder.com/200')}" class="w-full h-full object-cover">
                        </div>
                        <div class="absolute bottom-4 right-6 text-right">
                            <p class="text-[10px] font-black text-brand-neon uppercase tracking-widest mt-1">#${val(p.nomor, '0')} • ${val(p.posisi)}</p>
                        </div>
                    </div>
                    
                    <div class="pt-16 px-6">
                        <h2 class="text-xl font-black uppercase tracking-tighter text-white leading-tight mb-4">${val(p.nama)}</h2>
                        <div class="grid grid-cols-3 gap-2 mb-6">
                            <div class="bg-white/5 rounded-xl p-2 border border-white/5 text-center">
                                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest mb-0.5">Umur</p>
                                <p class="text-[10px] font-black text-white">${val(p.kategori, '-')}</p>
                            </div>
                            <div class="bg-white/5 rounded-xl p-2 border border-white/5 text-center">
                                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest mb-0.5">Gol</p>
                                <p class="text-[10px] font-black text-brand-gold">${val(p.gol, 0)}</p>
                            </div>
                            <div class="bg-white/5 rounded-xl p-2 border border-white/5 text-center">
                                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest mb-0.5">Kaki</p>
                                <p class="text-[10px] font-black text-white uppercase">${val(p.kaki)}</p>
                            </div>
                        </div>
                        <button onclick="bukaProfilPenuh(${idx})" class="w-full bg-brand-neon hover:bg-brand-blue text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all shadow-lg shadow-brand-neon/20 flex items-center justify-center gap-2">
                           <i data-lucide="scan-line" class="w-4 h-4"></i> Buka Dossier Pemain
                        </button>
                    </div>
                </div>`;
            document.getElementById('playerModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        // HALAMAN PROFIL PENUH
        function bukaProfilPenuh(idx) {
            closeModal(); // Tutup pop-up kecil
            const p = rawData.pemain[idx];
            const coords = getPosCoords(p.posisi);
            const page = document.getElementById('fullProfilePage');

            page.innerHTML = `
                <div class="sticky top-0 z-50 glass-panel border-b border-white/10 px-5 py-4 flex items-center justify-between">
                    <button onclick="tutupProfilPenuh()" class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors text-xs font-bold uppercase tracking-widest">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i> Kembali
                    </button>
                    <span class="text-[10px] font-black text-brand-neon uppercase tracking-widest">Player Dossier</span>
                </div>

                <div class="relative pt-10 pb-16 px-5 flex flex-col items-center justify-center border-b border-white/5 bg-gradient-to-b from-brand-blue/10 to-brand-dark">
                    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                    <div class="relative z-10 w-32 h-32 md:w-40 md:h-40 rounded-[2.5rem] overflow-hidden border-2 border-brand-neon shadow-[0_0_30px_rgba(59,130,246,0.3)] mb-6">
                        <img src="${val(p.link_foto, 'https://via.placeholder.com/300')}" class="w-full h-full object-cover">
                    </div>
                    <h2 class="relative z-10 text-3xl md:text-4xl font-black uppercase tracking-tighter text-white text-center leading-none">${val(p.nama)}</h2>
                    <div class="relative z-10 flex gap-3 mt-4">
                        <span class="text-xs font-black bg-brand-neon/20 text-brand-neon border border-brand-neon/30 px-4 py-1.5 rounded-lg uppercase shadow-sm">POS: ${val(p.posisi)}</span>
                        <span class="text-xs font-black bg-white/10 text-white border border-white/10 px-4 py-1.5 rounded-lg uppercase shadow-sm">#${val(p.nomor, '0')}</span>
                    </div>
                </div>

                <div class="max-w-4xl mx-auto px-5 py-8 space-y-8 pb-32">

                    <div class="glass-panel p-6 rounded-[2rem] border border-white/5">
                        <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-6 flex items-center gap-2"><i data-lucide="crosshair" class="w-4 h-4 text-brand-neon"></i> Tactical Deployment</h3>
                        <div class="pitch-container large">
                            <div class="pitch-half"></div>
                            <div class="pitch-circle pitch-line"></div>
                            <div class="pitch-penalty pitch-line"></div>
                            <div class="pitch-penalty-bottom pitch-line"></div>
                            <div class="player-marker" style="bottom: ${coords.bottom}; left: ${coords.left};">${val(p.posisi)}</div>
                        </div>
                    </div>

                    <div class="glass-panel p-6 rounded-[2rem] border border-white/5">

                    <div class="h-32 bg-gradient-to-br from-brand-blue to-brand-neon relative">
                        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-30"></div>
                        <div class="absolute -bottom-16 left-8 w-28 h-28 rounded-2xl overflow-hidden border-4 border-brand-surface shadow-2xl bg-brand-surface">
                            <img src="${val(p.link_foto, 'https://via.placeholder.com/200')}" class="w-full h-full object-cover">
                        </div>
                        <div class="absolute bottom-4 right-8 text-right">
                            <h2 class="text-xl font-black uppercase tracking-tighter text-white leading-none">${val(p.nama)}</h2>
                            <p class="text-[9px] font-black text-brand-neon uppercase tracking-widest mt-1">#${val(p.nomor, '0')} • ${val(p.posisi)}</p>
                        </div>
                    </div>
                    
                    <div class="pt-20 pb-8 px-6">
                        <div class="pitch-container mb-6">
                            <div class="pitch-half"></div>
                            <div class="pitch-circle pitch-line"></div>
                            <div class="pitch-penalty pitch-line"></div>
                            <div class="pitch-penalty-bottom pitch-line"></div>
                            <div class="player-marker" style="bottom: ${coords.bottom}; left: ${coords.left};"></div>
                            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <span class="text-[7px] font-black text-brand-neon/20 uppercase tracking-[1em] rotate-90">TACTICAL VIEW</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="bg-white/5 rounded-xl p-3 border border-white/5">
                                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest mb-1">Tgl Lahir</p>
                                <p class="text-xs font-black text-white">${val(p.tanggal_lahir, 'Belum Diisi')}</p>
                            </div>
                            <div class="bg-white/5 rounded-xl p-3 border border-white/5">
                                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest mb-1">Kaki Kuat</p>
                                <p class="text-xs font-black text-white uppercase">${val(p.kaki)}</p>
                            </div>
                            <div class="bg-white/5 rounded-xl p-3 border border-white/5">
                                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest mb-1">Gol / Poin</p>
                                <p class="text-sm font-black text-brand-gold">${val(p.gol, 0)}</p>
                            </div>
                            <div class="bg-white/5 rounded-xl p-3 border border-white/5">
                                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest mb-1">Postur</p>
                                <p class="text-xs font-black text-white">${val(p.tinggi)}cm / ${val(p.berat)}kg</p>
                            </div>
                        </div>
                        
                        <button onclick="toggleProfilLengkap(this)" class="w-full bg-brand-neon hover:bg-brand-blue text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all shadow-lg shadow-brand-neon/20 flex items-center justify-center gap-2">
                           <i data-lucide="user" class="w-4 h-4"></i> Lihat Profil Lengkap
                        </button>
                        
                        <div id="panel-profil-lengkap" class="hidden mt-4 text-left border-t border-white/10 pt-4 animate-fade-in">
                            <div class="bg-gradient-to-r from-brand-blue/10 to-brand-neon/10 rounded-xl p-4 border border-brand-blue/20 mb-3">
                                <p class="text-[8px] text-brand-neon font-black uppercase tracking-widest mb-1"><i data-lucide="graduation-cap" class="w-3 h-3 inline pb-0.5"></i> Asal Instansi / Sekolah</p>
                                <p class="text-xs font-bold text-white uppercase">${val(p.sekolah, 'Belum Terdaftar')}</p>
                            </div>
                            <div class="bg-white/5 rounded-xl p-4 border border-white/5">
                                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest mb-1"><i data-lucide="tag" class="w-3 h-3 inline pb-0.5"></i> Kategori Umur</p>
                                <p class="text-xs font-black text-white uppercase">${val(p.kategori, '-')}</p>
                            </div>
                        </div>`;
            document.getElementById('playerModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('playerModal').classList.add('hidden'); document.body.style.overflow = ''; }
        function switchMode(mode) {
            const isSquad = mode === 'squad';
            document.getElementById('view-squad').classList.toggle('hidden', !isSquad);
            document.getElementById('view-gallery').classList.toggle('hidden', isSquad);
            const tS = document.getElementById('tab-squad'), tG = document.getElementById('tab-gallery');
            [tS, tG].forEach(b => b.className = "px-4 py-1.5 text-[10px] font-bold uppercase tracking-widest text-gray-500 hover:text-white transition-all");
            const act = isSquad ? tS : tG;
            act.className = "px-4 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-lg bg-white dark:bg-brand-surface text-brand-blue dark:text-white shadow-sm transition-all";
        }

        function toggleProfilLengkap(btnElement) {
            const panel = document.getElementById('panel-profil-lengkap');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                btnElement.innerHTML = '<i data-lucide="chevron-up" class="w-4 h-4"></i> Sembunyikan Profil';
                btnElement.classList.replace('bg-brand-neon', 'bg-white/10');
                btnElement.classList.replace('text-white', 'text-gray-300');
            } else {
                panel.classList.add('hidden');
                btnElement.innerHTML = '<i data-lucide="user" class="w-4 h-4"></i> Lihat Profil Lengkap';
                btnElement.classList.replace('bg-white/10', 'bg-brand-neon');
                btnElement.classList.replace('text-gray-300', 'text-white');
            }
            lucide.createIcons();
        }
        
        function renderGallery(list) {
            const grid = document.getElementById('galleryGrid');
            if (!list || list.length === 0) { grid.innerHTML = `<div class="col-span-full py-16 text-center text-[10px] font-black text-gray-500 uppercase tracking-widest">Kosong</div>`; return; }
            grid.innerHTML = list.map((item, i) => `
                <a href="${item.link_drive}" target="_blank" class="glass-panel rounded-2xl p-3 flex flex-col gap-3 relative overflow-hidden group stagger-item border border-white/5" style="animation-delay: ${i*0.05}s">
                    <div class="relative w-full aspect-video rounded-xl bg-brand-dark overflow-hidden">
                        ${item.preview_image ? `<img src="${item.preview_image}" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">` : '<div class="absolute inset-0 flex items-center justify-center"><i data-lucide="folder" class="w-10 h-10 text-white/10"></i></div>'}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                        <div class="absolute bottom-3 left-3 text-white"><h4 class="text-xs font-black uppercase tracking-tight line-clamp-1">${val(item.kegiatan)}</h4><p class="text-[9px] font-bold text-gray-300 uppercase mt-0.5">${val(item.tanggal)}</p></div>
                    </div>
                </a>`).join('');
            lucide.createIcons();
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
