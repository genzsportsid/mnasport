<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MNA FC | Management Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#2563eb',
                        'brand-gold': '#d7b67d',
                        'brand-dark-bg': '#09090b',
                    }
                }
            }
        }
    </script>
    <style>
        .glass-main { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; cursor: pointer; }
        .glass-card:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-3px); border-color: #2563eb; }
        .glass-modal { background: rgba(15, 15, 20, 0.95); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .modal-enter { animation: modalIn 0.3s ease-out forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="bg-[#F9FAFB] dark:bg-brand-dark-bg text-gray-900 dark:text-white transition-colors duration-500 pb-32">

    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-brand-dark-bg/80 backdrop-blur-md border-b border-gray-200 dark:border-white/10 pt-safe">
        <div class="max-w-3xl mx-auto px-5 h-16 flex items-center justify-between">
            <h1 class="font-black text-xl italic uppercase tracking-tighter">MNA <span class="text-brand-blue">FC</span></h1>
            <span class="text-[9px] font-bold py-1 px-3 bg-brand-blue/10 text-brand-blue rounded-full uppercase tracking-widest">Command Center</span>
        </div>
    </header>

    <main class="pt-24 px-5 max-w-3xl mx-auto">
        <div id="team-stats" class="glass-main rounded-[2rem] p-6 mb-8 grid grid-cols-3 gap-4 border border-gray-200 dark:border-white/5">
            <div class="text-center">
                <p id="win-rate" class="text-2xl font-black text-brand-blue">0%</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Win Rate</p>
            </div>
            <div class="text-center border-x border-gray-200 dark:border-white/10">
                <p id="match-record" class="text-2xl font-black text-gray-900 dark:text-white transition-colors">0-0-0</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">W - D - L</p>
            </div>
            <div class="text-center">
                <p id="goal-diff" class="text-2xl font-black text-brand-gold">+0</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Goal Diff</p>
            </div>
        </div>

        <div class="flex p-1 bg-gray-100 dark:bg-white/5 rounded-2xl mb-8 max-w-[240px] mx-auto border border-gray-200 dark:border-white/10">
            <button onclick="switchMode('squad')" id="btn-mode-squad" class="flex-1 py-2 text-[10px] font-bold uppercase tracking-widest rounded-xl bg-brand-blue text-white shadow-lg transition-all">Squad</button>
            <button onclick="switchMode('gallery')" id="btn-mode-gallery" class="flex-1 py-2 text-[10px] font-bold uppercase tracking-widest text-gray-500 transition-all">Media Hub</button>
        </div>

        <div id="view-squad" class="block space-y-6">
            <div class="sticky top-20 z-40 bg-[#F9FAFB]/95 dark:bg-brand-dark-bg/95 py-2">
                <input type="text" id="playerSearch" oninput="runFilter()" placeholder="Ketik nama atau asal sekolah..." 
                    class="w-full bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-2xl py-3 px-5 text-sm mb-4 outline-none focus:ring-2 focus:ring-brand-blue transition-all">
                <div class="flex gap-2 overflow-x-auto hide-scroll pb-2">
                    <button onclick="setPosFilter('ALL', this)" class="pos-btn bg-brand-blue text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-brand-blue/20">ALL</button>
                    <button onclick="setPosFilter('GK', this)" class="pos-btn bg-white dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase border border-gray-200 dark:border-white/10">GK</button>
                    <button onclick="setPosFilter('DEF', this)" class="pos-btn bg-white dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase border border-gray-200 dark:border-white/10">DEF</button>
                    <button onclick="setPosFilter('MID', this)" class="pos-btn bg-white dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase border border-gray-200 dark:border-white/10">MID</button>
                    <button onclick="setPosFilter('FWD', this)" class="pos-btn bg-white dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase border border-gray-200 dark:border-white/10">FWD</button>
                </div>
            </div>
            <div id="playerGrid" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="view-gallery" class="hidden space-y-6">
            <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>
    </main>

    <div id="playerModal" class="fixed inset-0 z-[150] hidden flex items-center justify-center p-5">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div id="modalContent" class="glass-modal w-full max-w-sm rounded-[2.5rem] overflow-hidden relative z-10 modal-enter"></div>
    </div>

    <nav id="main-bottom-nav" class="fixed bottom-0 w-full z-[110] bg-white/90 dark:bg-[#09090b]/90 backdrop-blur-xl border-t border-gray-200 dark:border-white/10 pb-safe transition-colors">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto px-2">
            <a href="/" class="flex flex-col items-center justify-center w-full h-full text-gray-400 dark:text-gray-500 hover:text-brand-gold transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mb-1"></i>
                <span class="text-[8px] font-bold uppercase">Operator</span>
            </a>
            <a href="/tsl/" class="flex flex-col items-center justify-center w-full h-full text-gray-400 dark:text-gray-500 hover:text-brand-green transition-colors">
                <i data-lucide="trophy" class="w-5 h-5 mb-1"></i>
                <span class="text-[8px] font-bold uppercase">TSL Liga</span>
            </a>
            <button class="flex flex-col items-center justify-center w-full h-full text-brand-blue transition-colors">
                <i data-lucide="shield" class="w-5 h-5 mb-1"></i>
                <span class="text-[8px] font-bold uppercase">MNA FC</span>
            </button>
        </div>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbw993ZoUft52Da4SWg-9l4rDFDxk0O_bjH-0_gzmBMOCJm4PGL-rPfJO5wWtJVzsf47SQ/exec';
        let rawData = { pemain: [], statistik: {}, galeri: [] };
        let activePos = 'ALL';

        const val = (data, fallback = "-") => (data === "" || data === null || data === undefined) ? fallback : data;

        async function init() {
            const cache = localStorage.getItem('mnafc_hub_cache');
            if (cache) {
                rawData = JSON.parse(cache);
                updateUI();
            }

            try {
                const res = await fetch(`${API_URL}?t=${Date.now()}`);
                const data = await res.json();
                rawData = data;
                localStorage.setItem('mnafc_hub_cache', JSON.stringify(data));
                updateUI();
            } catch (e) {
                console.error("Sync Error:", e);
            }
            lucide.createIcons();
        }

        function updateUI() {
            renderStats(rawData.statistik);
            runFilter();
            renderGallery(rawData.galeri);
        }

        function renderStats(s) {
            if(!s) return;
            const m = parseInt(val(s.menang, 0)), s_ = parseInt(val(s.seri, 0)), k = parseInt(val(s.kalah, 0));
            const total = m + s_ + k;
            document.getElementById('win-rate').innerText = (total > 0 ? Math.round((m/total)*100) : 0) + '%';
            document.getElementById('match-record').innerText = `${m}-${s_}-${k}`;
            const diff = parseInt(val(s.gol_masuk, 0)) - parseInt(val(s.gol_kemasukan, 0));
            document.getElementById('goal-diff').innerText = (diff >= 0 ? '+' : '') + diff;
        }

        function renderPlayers(list) {
            const grid = document.getElementById('playerGrid');
            if (list.length === 0) {
                grid.innerHTML = `<div class="py-10 text-center text-[10px] font-bold text-gray-400 uppercase tracking-widest">Pemain tidak ditemukan</div>`;
                return;
            }
            grid.innerHTML = list.map(p => {
                const originalIdx = rawData.pemain.findIndex(orig => orig === p);
                return `
                <div onclick="showPlayerDetail(${originalIdx})" class="glass-card rounded-[2.5rem] p-5 flex items-center gap-5 relative overflow-hidden group">
                    <div class="absolute -right-4 -bottom-4 text-7xl font-black text-brand-black/5 dark:text-white/5 italic">${val(p.nomor, '00')}</div>
                    <div class="w-20 h-20 rounded-3xl overflow-hidden bg-gray-100 dark:bg-white/10 shrink-0 border border-gray-200 dark:border-white/10">
                        <img src="${val(p.link_foto, 'https://via.placeholder.com/200')}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0 z-10">
                        <h4 class="text-base font-black uppercase tracking-tighter truncate text-brand-black dark:text-white">${val(p.nama, 'Pemain')}</h4>
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[9px] font-bold bg-brand-blue/10 text-brand-blue px-2 py-0.5 rounded-full uppercase">${val(p.posisi, 'Posisi')}</span>
                            <span class="text-[9px] text-gray-500 font-bold uppercase truncate">${val(p.sekolah, 'Instansi')}</span>
                        </div>
                        <div class="flex gap-4">
                            <div class="text-center"><p class="text-[7px] text-gray-500 uppercase font-bold">Gol</p><p class="text-xs font-black text-brand-gold">${val(p.gol, 0)}</p></div>
                            <div class="text-center"><p class="text-[7px] text-gray-500 uppercase font-bold">Nomor</p><p class="text-xs font-black">#${val(p.nomor, '0')}</p></div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function renderGallery(list) {
            const grid = document.getElementById('galleryGrid');
            if (!list || list.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-500 font-bold text-[10px] uppercase tracking-widest">Belum ada album media</p>`;
                return;
            }
            grid.innerHTML = list.map(item => `
                <a href="${item.link_drive}" target="_blank" class="glass-card rounded-[2.5rem] p-4 flex flex-col gap-4 group transition-all">
                    <div class="relative h-32 rounded-3xl bg-brand-blue/10 overflow-hidden border border-white/5 shadow-inner">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <i data-lucide="images" class="w-10 h-10 text-brand-blue/20 group-hover:scale-110 transition-transform"></i>
                        </div>
                        ${item.preview_image ? `<img src="${item.preview_image}" class="absolute inset-0 w-full h-full object-cover">` : ''}
                        <div class="absolute top-4 left-4 bg-brand-blue text-white text-[8px] font-black px-3 py-1 rounded-full uppercase shadow-lg shadow-brand-blue/30">${val(item.tanggal)}</div>
                    </div>
                    <div class="px-2 pb-2">
                        <h4 class="text-[11px] font-black uppercase tracking-tight text-brand-black dark:text-white mb-1 line-clamp-1">${val(item.kegiatan, 'Dokumentasi')}</h4>
                        <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest flex items-center gap-1 italic">Akses Folder Drive <i data-lucide="external-link" class="w-2.5 h-2.5"></i></p>
                    </div>
                </a>`).join('');
            lucide.createIcons();
        }

        function runFilter() {
            const query = document.getElementById('playerSearch').value.toLowerCase();
            const filtered = rawData.pemain.filter(p => {
                const matchTxt = (val(p.nama) + val(p.sekolah)).toLowerCase().includes(query);
                
                // Smart Scanner
                const posTxt = val(p.posisi).toUpperCase();
                let bPos = 'LAINNYA';
                if (posTxt.includes('GAWANG') || posTxt.includes('KIPER') || posTxt === 'GK') bPos = 'GK';
                else if (posTxt.includes('BEK') || posTxt.includes('DEFENDER') || posTxt.includes('BACK') || ['CB','RB','LB','RWB','LWB'].includes(posTxt)) bPos = 'DEF';
                else if (posTxt.includes('GELANDANG') || posTxt.includes('MIDFIELD') || ['CM','CDM','CAM','RM','LM'].includes(posTxt)) bPos = 'MID';
                else if (posTxt.includes('PENYERANG') || posTxt.includes('SAYAP') || posTxt.includes('STRIKER') || ['ST','CF','RW','LW','SS'].includes(posTxt)) bPos = 'FWD';

                return matchTxt && (activePos === 'ALL' || bPos === activePos);
            });
            renderPlayers(filtered);
        }

        function setPosFilter(pos, btn) {
            activePos = pos;
            document.querySelectorAll('.pos-btn').forEach(b => {
                b.className = "pos-btn bg-white dark:bg-white/5 text-gray-400 px-5 py-2 rounded-xl text-[10px] font-black uppercase border border-gray-200 dark:border-white/10";
            });
            btn.className = "pos-btn bg-brand-blue text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-brand-blue/20";
            runFilter();
        }

        function switchMode(mode) {
            const isSquad = mode === 'squad';
            document.getElementById('view-squad').classList.toggle('hidden', !isSquad);
            document.getElementById('view-gallery').classList.toggle('hidden', isSquad);
            const bS = document.getElementById('btn-mode-squad'), bG = document.getElementById('btn-mode-gallery');
            [bS, bG].forEach(b => b.className = "flex-1 py-2 text-[10px] font-bold uppercase tracking-widest text-gray-500");
            const act = isSquad ? bS : bG;
            act.className = "flex-1 py-2 text-[10px] font-bold uppercase tracking-widest rounded-xl bg-brand-blue text-white shadow-lg";
        }

        function showPlayerDetail(idx) {
            const p = rawData.pemain[idx];
            document.getElementById('modalContent').innerHTML = `
                <div class="relative">
                    <button onclick="closeModal()" class="absolute top-6 right-6 z-20 bg-black/40 text-white p-2 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
                    <div class="h-48 bg-gradient-to-b from-brand-blue/40 to-transparent absolute inset-0"></div>
                    <div class="p-8 relative z-10 text-center text-white">
                        <img src="${val(p.link_foto, 'https://via.placeholder.com/200')}" class="w-32 h-32 mx-auto rounded-[2.5rem] object-cover border-4 border-brand-blue shadow-2xl mb-4">
                        <h2 class="text-2xl font-black uppercase tracking-tighter">${val(p.nama)}</h2>
                        <p class="text-brand-blue font-bold tracking-[0.3em] uppercase text-[10px] mb-6">${val(p.posisi)}</p>
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5"><p class="text-[8px] text-gray-500 font-bold uppercase">Kaki</p><p class="text-sm font-black uppercase">${val(p.kaki)}</p></div>
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5"><p class="text-[8px] text-gray-500 font-bold uppercase">Gol</p><p class="text-sm font-black text-brand-gold">${val(p.gol, 0)}</p></div>
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5"><p class="text-[8px] text-gray-500 font-bold uppercase">Fisik</p><p class="text-sm font-black">${val(p.tinggi)}cm / ${val(p.berat)}kg</p></div>
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5"><p class="text-[8px] text-gray-500 font-bold uppercase">Umur</p><p class="text-sm font-black uppercase">${val(p.kategori)}</p></div>
                        </div>
                        <div class="bg-white/5 rounded-2xl p-4 border border-white/5 italic text-xs text-gray-300">"${val(p.sekolah)}"</div>
                    </div>
                </div>`;
            document.getElementById('playerModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('playerModal').classList.add('hidden'); document.body.style.overflow = ''; }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
