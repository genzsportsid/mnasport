<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MNA Sport | Ecosystem Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#1d4ed8',
                        'brand-neon': '#3b82f6',
                        'brand-gold': '#d7b67d',
                        'brand-dark': '#050505',
                        'brand-surface': '#111111',
                        'tsl-green': '#009A44',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #050505; color: #ffffff; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .glass-panel { background: rgba(17, 17, 17, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .bento-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; position: relative; }
        .bento-card:hover { transform: translateY(-5px) scale(1.02); z-index: 10; }
        
        .stagger-item { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* Neon Glows */
        .glow-blue { box-shadow: 0 0 30px rgba(59, 130, 246, 0.15); }
        .glow-green { box-shadow: 0 0 30px rgba(0, 154, 68, 0.15); }
    </style>
</head>
<body class="bg-[#F9FAFB] dark:bg-brand-dark pb-32 transition-colors duration-500 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <header class="fixed top-0 w-full z-50 bg-brand-dark/80 backdrop-blur-xl border-b border-white/5 pt-safe transition-all">
        <div class="max-w-4xl mx-auto px-5 h-16 flex items-center justify-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-blue to-tsl-green flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                    <span class="font-black text-white text-xs tracking-tighter">M</span>
                </div>
                <h1 class="font-black text-xl italic tracking-tighter uppercase text-white">MNA <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-blue to-tsl-green">SPORT</span></h1>
            </div>
        </div>
    </header>

    <main class="pt-24 px-5 max-w-4xl mx-auto space-y-8">
        
        <section class="text-center space-y-3 relative py-6 stagger-item" style="animation-delay: 0.1s;">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-brand-neon/10 blur-[100px] rounded-full pointer-events-none"></div>
            <h2 class="text-4xl md:text-5xl font-black uppercase tracking-tighter leading-tight">
                Pusat Ekosistem <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-blue via-brand-neon to-white">Sepak Bola Modern</span>
            </h2>
            <p class="text-[10px] text-gray-400 font-bold tracking-[0.3em] uppercase max-w-md mx-auto">Sistem Manajemen Terintegrasi Untuk Klub & Liga Pelajar</p>
        </section>

        <section class="grid grid-cols-2 gap-4 md:gap-6 stagger-item" style="animation-delay: 0.2s;">
            
            <a href="/mnafc/" class="bento-card glass-panel rounded-[2rem] p-6 border border-brand-blue/20 glow-blue group block">
                <div class="absolute -right-6 -bottom-6 text-brand-blue/10 group-hover:scale-110 transition-transform duration-500">
                    <i data-lucide="shield" class="w-40 h-40"></i>
                </div>
                <div class="relative z-10 flex flex-col h-full justify-between min-h-[120px]">
                    <div class="w-10 h-10 rounded-full bg-brand-blue/20 flex items-center justify-center mb-4 border border-brand-blue/30 group-hover:bg-brand-blue transition-colors">
                        <i data-lucide="swords" class="w-5 h-5 text-brand-neon group-hover:text-white"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl font-black uppercase tracking-tighter text-white mb-1">MNA FC</h3>
                        <p class="text-[9px] font-bold text-brand-neon uppercase tracking-widest">Klub & Akademi</p>
                    </div>
                </div>
            </a>

            <a href="/tsl/" class="bento-card glass-panel rounded-[2rem] p-6 border border-tsl-green/20 glow-green group block">
                <div class="absolute -right-6 -bottom-6 text-tsl-green/10 group-hover:scale-110 transition-transform duration-500">
                    <i data-lucide="trophy" class="w-40 h-40"></i>
                </div>
                <div class="relative z-10 flex flex-col h-full justify-between min-h-[120px]">
                    <div class="w-10 h-10 rounded-full bg-tsl-green/20 flex items-center justify-center mb-4 border border-tsl-green/30 group-hover:bg-tsl-green transition-colors">
                        <i data-lucide="medal" class="w-5 h-5 text-tsl-green group-hover:text-white"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl font-black uppercase tracking-tighter text-white mb-1">TSL 2026</h3>
                        <p class="text-[9px] font-bold text-tsl-green uppercase tracking-widest">Liga Pelajar</p>
                    </div>
                </div>
            </a>

        </section>

        <section class="stagger-item" style="animation-delay: 0.3s;">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xs font-black uppercase tracking-widest flex items-center gap-2 text-white">
                    <i data-lucide="radio" class="w-4 h-4 text-brand-neon animate-pulse"></i> Radar Berita
                </h3>
            </div>
            <div id="newsGrid" class="flex gap-4 overflow-x-auto hide-scroll pb-4 snap-x snap-mandatory">
                <div class="glass-panel min-w-[260px] h-[140px] rounded-2xl p-4 flex items-center justify-center animate-pulse border border-white/5">
                    <div class="w-6 h-6 border-2 border-brand-neon border-t-transparent rounded-full animate-spin"></div>
                </div>
            </div>
        </section>

        <section class="stagger-item" style="animation-delay: 0.4s;">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xs font-black uppercase tracking-widest flex items-center gap-2 text-white">
                    <i data-lucide="camera" class="w-4 h-4 text-tsl-green"></i> Lensa Ekosistem
                </h3>
            </div>
            <div id="mediaGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="glass-panel aspect-square rounded-2xl animate-pulse border border-white/5"></div>
                <div class="glass-panel aspect-square rounded-2xl animate-pulse border border-white/5"></div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full z-[110] bg-brand-surface/95 backdrop-blur-2xl border-t border-white/5 pb-safe transition-colors">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto px-2">
            <button class="flex flex-col items-center justify-center w-full h-full text-white transition-colors relative">
                <div class="absolute -top-1 w-8 h-1 bg-white rounded-b-full"></div>
                <i data-lucide="layout-dashboard" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Ekosistem</span>
            </button>
            <a href="/tsl/" class="flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-tsl-green transition-colors">
                <i data-lucide="trophy" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">TSL Liga</span>
            </a>
            <a href="/mnafc/" class="flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-brand-neon transition-colors">
                <i data-lucide="shield" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">MNA FC</span>
            </a>
        </div>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbws_yoHGqge_wnAciFE02oJUhXLikMh8txqEUHbzvFKfF1-etTGD6pPkFF5B1i7AanpUQ/exec'; 

        const val = (data, fallback = "-") => (data === "" || data === null || data === undefined) ? fallback : data;

        async function init() {
            lucide.createIcons();
            try {
                // Fetch data dari spreadsheet (termasuk galeri dan berita jika sudah ditambah di Apps Script)
                const res = await fetch(`${API_URL}?t=${Date.now()}`);
                const data = await res.json();
                
                renderNews(data.berita);
                renderMedia(data.galeri);
            } catch (e) { 
                console.error("Gagal sinkronisasi data", e);
                // Tampilkan Fallback Error UI
                document.getElementById('newsGrid').innerHTML = `<p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest px-4">Gagal memuat berita.</p>`;
                document.getElementById('mediaGrid').innerHTML = `<p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest col-span-full">Gagal memuat galeri.</p>`;
            }
        }

        function renderNews(beritaList) {
            const grid = document.getElementById('newsGrid');
            
            if (!beritaList || beritaList.length === 0) {
                grid.innerHTML = `
                    <div class="glass-panel min-w-[280px] rounded-[1.5rem] p-5 border border-white/5 snap-start">
                        <p class="text-[10px] font-black text-brand-neon uppercase tracking-widest mb-2">SYSTEM INFO</p>
                        <h4 class="text-sm font-black text-white leading-tight uppercase">Belum ada berita disiarkan</h4>
                        <p class="text-[10px] text-gray-400 mt-2">Tambahkan data di tab "Berita" Spreadsheet Anda.</p>
                    </div>
                `;
                return;
            }

            const latestNews = beritaList.slice().reverse().slice(0, 5);

            grid.innerHTML = latestNews.map(b => `
                <a href="${val(b.link_tautan, '#')}" target="${b.link_tautan ? '_blank' : '_self'}" class="glass-panel min-w-[280px] w-[280px] rounded-[1.5rem] overflow-hidden border border-white/5 snap-start group hover:border-brand-neon/50 transition-all flex flex-col">
                    
                    ${b.link_gambar && b.link_gambar !== '-' ? `
                    <div class="w-full h-32 relative overflow-hidden bg-brand-dark">
                        <img src="${b.link_gambar}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-110 transition-all duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#111111] via-transparent to-transparent"></div>
                    </div>
                    ` : ''}
                    
                    <div class="p-5 flex flex-col flex-1 ${b.link_gambar && b.link_gambar !== '-' ? '-mt-8 relative z-10' : ''}">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-[8px] font-black bg-white/10 text-white px-2 py-1 rounded uppercase tracking-widest backdrop-blur-md shadow-sm">${val(b.tanggal)}</span>
                            <span class="text-[8px] font-black text-brand-neon uppercase tracking-widest flex items-center gap-1 drop-shadow-md"><i data-lucide="hash" class="w-3 h-3"></i>${val(b.kategori, 'INFO')}</span>
                        </div>
                        <h4 class="text-sm font-black text-white leading-tight uppercase tracking-tight group-hover:text-brand-neon transition-colors line-clamp-2 mb-2 drop-shadow-sm">${val(b.judul)}</h4>
                        <p class="text-[10px] text-gray-400 line-clamp-2 leading-relaxed">${val(b.ringkasan, 'Baca selengkapnya...')}</p>
                    </div>
                </a>
            `).join('');
            lucide.createIcons();
        }
        
        function renderMedia(galeriList) {
            const grid = document.getElementById('mediaGrid');
            
            if (!galeriList || galeriList.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-10 text-center"><p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Belum ada tangkapan lensa.</p></div>`;
                return;
            }

            // Ambil 4 foto terbaru saja untuk di beranda
            const latestMedia = galeriList.slice().reverse().slice(0, 4);

            grid.innerHTML = latestMedia.map(item => `
                <a href="${item.link_drive}" target="_blank" class="glass-panel aspect-square rounded-2xl overflow-hidden relative group border border-white/5 block">
                    ${item.preview_image 
                        ? `<img src="${item.preview_image}" class="w-full h-full object-cover opacity-70 group-hover:opacity-100 group-hover:scale-110 transition-all duration-700">` 
                        : `<div class="w-full h-full flex items-center justify-center bg-white/5"><i data-lucide="image" class="w-8 h-8 text-white/20"></i></div>`
                    }
                    <div class="absolute inset-0 bg-gradient-to-t from-brand-dark/90 via-transparent to-transparent opacity-80"></div>
                    <div class="absolute bottom-2 left-2 right-2">
                        <p class="text-[8px] font-black text-white uppercase tracking-tighter line-clamp-1 leading-none shadow-black drop-shadow-md">${val(item.kegiatan)}</p>
                    </div>
                </a>
            `).join('');
            lucide.createIcons();
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
